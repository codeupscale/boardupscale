version: '3.9'

services:
  nginx:
    build: ./services/nginx
    ports:
      - '8091:80'
    depends_on:
      - api
      - web
    networks:
      - boardupscale
    restart: unless-stopped

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=/api
      - VITE_WS_URL=
    depends_on:
      - api
    networks:
      - boardupscale
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://boardupscale:boardupscale@postgres:5432/boardupscale
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=boardupscale
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - JWT_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@boardupscale.local
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8091}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8091}
      - PORT=4000
      - AI_ENABLED=${AI_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - AI_MAX_TOKENS_PER_ORG_PER_DAY=${AI_MAX_TOKENS_PER_ORG_PER_DAY:-100000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_APP_WEBHOOK_SECRET=${GITHUB_APP_WEBHOOK_SECRET:-}
      - SAML_ENTRY_POINT=${SAML_ENTRY_POINT:-}
      - SAML_ISSUER=${SAML_ISSUER:-boardupscale}
      - SAML_CERT=${SAML_CERT:-}
      - SAML_CALLBACK_URL=${SAML_CALLBACK_URL:-}
      - ENTERPRISE_ENABLED=${ENTERPRISE_ENABLED:-false}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - boardupscale
    restart: unless-stopped

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://boardupscale:boardupscale@postgres:5432/boardupscale
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=boardupscale
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@boardupscale.local
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8091}
      - AI_ENABLED=${AI_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - boardupscale
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_DB=boardupscale
      - POSTGRES_USER=boardupscale
      - POSTGRES_PASSWORD=boardupscale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5435:5432'
    networks:
      - boardupscale
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boardupscale']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - '6381:6379'
    networks:
      - boardupscale
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - '9202:9200'
    networks:
      - boardupscale
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '9010:9000'
      - '9011:9001'
    networks:
      - boardupscale
    restart: unless-stopped

  mailhog:
    image: axllent/mailpit:latest
    ports:
      - '1027:1025'
      - '8026:8025'
    networks:
      - boardupscale

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  boardupscale:
    driver: bridge
