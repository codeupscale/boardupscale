<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Primary meta (overridden per-page by react-helmet-async) -->
    <title>Boardupscale — Free, Open-Source Jira Alternative</title>
    <meta
      name="description"
      content="The free, open-source alternative to Jira. Kanban, Scrum, AI duplicate detection, sprint planning, GitHub integration and more — self-hosted or in the cloud."
    />
    <meta
      name="keywords"
      content="jira alternative, project management, kanban, scrum, agile, open source, self-hosted, issue tracker, sprint planning, AI duplicate detection"
    />
    <meta name="author" content="Boardupscale" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Canonical (overridden per-page) -->
    <link rel="canonical" href="https://boardupscale.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Boardupscale" />
    <meta property="og:title" content="Boardupscale — Free, Open-Source Jira Alternative" />
    <meta
      property="og:description"
      content="The free, open-source alternative to Jira. Kanban, Scrum, AI duplicate detection, sprint planning, GitHub integration and more."
    />
    <meta property="og:image" content="https://boardupscale.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://boardupscale.com/" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@boardupscale" />
    <meta name="twitter:title" content="Boardupscale — Free, Open-Source Jira Alternative" />
    <meta
      name="twitter:description"
      content="The free, open-source alternative to Jira. Kanban, Scrum, AI duplicate detection, sprint planning and more."
    />
    <meta name="twitter:image" content="https://boardupscale.com/og-image.png" />

    <!-- Structured Data — Organisation + SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://boardupscale.com/#organization",
            "name": "Boardupscale",
            "url": "https://boardupscale.com",
            "logo": {
              "@type": "ImageObject",
              "url": "https://boardupscale.com/favicon.svg"
            },
            "sameAs": [
              "https://github.com/codeupscale/boardupscale"
            ]
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://boardupscale.com/#app",
            "name": "Boardupscale",
            "url": "https://boardupscale.com",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "description": "The free, open-source alternative to Jira. AI-powered project management with Kanban, Scrum, duplicate detection, and GitHub integration.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "publisher": {
              "@id": "https://boardupscale.com/#organization"
            },
            "featureList": [
              "Kanban and Scrum boards",
              "AI duplicate issue detection",
              "Sprint planning",
              "GitHub integration",
              "Real-time collaboration",
              "SAML SSO",
              "Custom automation rules",
              "Time tracking"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://boardupscale.com/#website",
            "url": "https://boardupscale.com",
            "name": "Boardupscale",
            "publisher": {
              "@id": "https://boardupscale.com/#organization"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
