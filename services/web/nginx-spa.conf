server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embeds DNS at 127.0.0.11. Without this, nginx resolves `api` once at
    # startup and keeps a stale IP after the API container restarts → 502 Bad Gateway.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to the NestJS backend
    location /api {
        set $api_upstream api:4000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50m;
    }

    # WebSocket — Socket.io proxy to the API backend
    location /socket.io {
        set $api_upstream api:4000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # SPA fallback for frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
