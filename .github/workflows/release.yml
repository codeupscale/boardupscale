name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.2.3-beta.1, etc.

permissions:
  contents: write       # needed to create GitHub Releases
  packages: write       # needed to push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/boardupscale

jobs:
  # ── Build & push Docker images ────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          CURR_TAG=${GITHUB_REF_NAME}

          if [ -z "$PREV_TAG" ]; then
            # First release — list all commits
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURR_TAG}")
          fi

          # Write to a file to handle multi-line output safely
          {
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "## Docker Images"
            echo ""
            echo "Pull the images for this release:"
            echo '```bash'
            echo "docker pull ${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.version }}"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.version }}"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-worker:${{ steps.version.outputs.version }}"
            echo '```'
            echo ""
            echo "## Quick Start"
            echo ""
            echo "Update \`docker-compose.yml\` to pin images to this version, then:"
            echo '```bash'
            echo "docker compose pull && docker compose up -d"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
