name: Deploy

on:
  # Auto-deploy to production after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  # Manual trigger — use for rollbacks or forcing a redeploy without a code push
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234, main, v1.2.3). Build step is skipped.'
        required: false
        default: 'main'

permissions:
  contents: read
  packages: write  # needed to push to GHCR

# Never cancel an in-flight deploy — queue the next one instead
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/boardupscale

jobs:
  # ── 1. Build & push Docker images ─────────────────────────────────────────
  # Runs on GitHub Actions (free tier, decent specs) instead of the production
  # server — keeps build load off prod and benefits from GHA layer caching.
  # Only runs on automatic triggers after CI succeeds.
  # Skipped on workflow_dispatch — the caller supplies an already-built tag.
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'

    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker]

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact commit CI tested, not HEAD
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          # Tag with both a stable "main" pointer and an immutable SHA tag
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:main
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:sha-${{ github.event.workflow_run.head_sha }}
          # Reuse layer cache across runs to keep builds fast
          cache-from: type=gha,scope=deploy-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=deploy-${{ matrix.service }}
          # Inject build args for frontend public variables
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ── 2. Zero-downtime rolling deploy ───────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    # Run when:
    #   - automatic: build succeeded (workflow_run path)
    #   - manual: workflow_dispatch (build job was skipped, use supplied tag)
    if: |
      always() && (
        (github.event_name == 'workflow_run' && needs.build-and-push.result == 'success') ||
        github.event_name == 'workflow_dispatch'
      )

    # Adds a required-approval gate + deployment tracking in the GitHub UI.
    # Create an environment called "production" in repo Settings → Environments.
    environment: production

    steps:
      # ── Resolve the image tag ─────────────────────────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Zero-downtime rolling deploy via SSH ──────────────────────────────
      # Strategy:
      #   1. Pull all images (no downtime)
      #   2. Run DB migrations in a one-shot container (before API restarts)
      #   3. Restart bu-api — wait for /api/health to be green
      #   4. Restart bu-worker (long grace period so active jobs finish)
      #   5. Restart bu-web — nginx will keep routing to old until new is up
      #   6. Verify all three are healthy, rollback on failure
      #   7. Prune old image layers
      - name: Zero-downtime rolling deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/boardupscale
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,IMAGE_PREFIX
          # 15-min timeout — migrations may take a few minutes
          command_timeout: 15m
          script: |
            set -euo pipefail

            COMPOSE_DIR=/home/ubuntu/infra
            API_IMAGE="${IMAGE_PREFIX}-api:${IMAGE_TAG}"
            WEB_IMAGE="${IMAGE_PREFIX}-web:${IMAGE_TAG}"
            WORKER_IMAGE="${IMAGE_PREFIX}-worker:${IMAGE_TAG}"

            log() { echo "[deploy] $*"; }
            die() { echo "[deploy] FATAL: $*" >&2; exit 1; }

            # ── Helper: wait for a compose service's Docker healthcheck to pass ──
            wait_healthy() {
              local svc="$1" max_wait="${2:-60}"
              log "Waiting for $svc to become healthy (max ${max_wait}s)..."
              local elapsed=0
              while [ $elapsed -lt $max_wait ]; do
                local state
                state=$(docker inspect --format='{{.State.Health.Status}}' "infra-${svc}-1" 2>/dev/null || echo "missing")
                if [ "$state" = "healthy" ]; then
                  log "$svc is healthy ✓"
                  return 0
                fi
                sleep 5
                elapsed=$((elapsed + 5))
              done
              die "$svc did not become healthy within ${max_wait}s (current state: $state)"
            }

            # ── Helper: wait for any named container's healthcheck to pass ─
            wait_healthy_named() {
              local name="$1" max_wait="${2:-180}"
              log "Waiting for $name to become healthy (max ${max_wait}s)..."
              local elapsed=0 state
              while [ $elapsed -lt $max_wait ]; do
                state=$(docker inspect --format='{{.State.Health.Status}}' "$name" 2>/dev/null || echo "missing")
                [ "$state" = "healthy" ] && { log "$name is healthy ✓"; return 0; }
                sleep 5; elapsed=$((elapsed + 5))
              done
              return 1
            }

            # ── Helper: rollback a single service to the 'main' tag ────────
            rollback_service() {
              local svc="$1"
              log "Rolling back $svc to :main tag..."
              cd "$COMPOSE_DIR"
              IMAGE_TAG=main docker compose up -d --no-deps --force-recreate "$svc" || true
            }

            # ── 1. Authenticate with GHCR ──────────────────────────────────
            log "Authenticating with GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # ── 2. Pull images (no downtime) ───────────────────────────────
            log "Pulling images (tag: ${IMAGE_TAG})..."
            docker pull "$API_IMAGE"
            docker pull "$WEB_IMAGE"
            docker pull "$WORKER_IMAGE"

            cd "$COMPOSE_DIR"
            export BU_IMAGE_TAG="${IMAGE_TAG}"

            # ── 3. Run DB migrations before restarting the API ─────────────
            # Use `docker compose run` (not raw `docker run --env-file`): a plain
            # container sees DATABASE_URL=...@localhost from .env, but Postgres
            # is reached via the compose network (e.g. hostname `postgres`).
            # This reuses bu-api's image tag (BU_IMAGE_TAG) and env wiring.
            log "Running database migrations..."
            docker compose run --rm --no-deps bu-api \
              node ./node_modules/typeorm/cli.js migration:run -d dist/src/database/data-source.js \
              || die "Database migrations failed — fix migrations or DB state before redeploying."

            # ── 4. Zero-downtime bu-api restart via canary pre-start ──────
            # Strategy: start new container alongside old one, wait for it to
            # be healthy, then gracefully drain old before switching compose
            # to the new image. nginx's resolver (127.0.0.11 valid=10s) will
            # pick up the canary as soon as it joins the network with the
            # 'api' alias, ensuring zero traffic gap during the swap.
            log "Starting bu-api canary container..."

            # Detect compose network and running container name
            OLD_API_CTR=$(docker ps --filter "name=infra-bu-api" --format "{{.Names}}" | head -1 || true)
            COMPOSE_NETWORK=$(docker inspect "$OLD_API_CTR" \
              --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' \
              2>/dev/null || echo "infra_boardupscale")

            # Dump env from running container so canary has identical config
            docker inspect "$OLD_API_CTR" \
              --format '{{range .Config.Env}}{{println .}}{{end}}' \
              > /tmp/bu-api-canary.env 2>/dev/null || true

            # Start canary on the compose network (so it can reach Postgres/Redis)
            # but WITHOUT the 'api' DNS alias yet — nginx ignores it during warmup
            docker run -d \
              --name bu-api-canary \
              --network "$COMPOSE_NETWORK" \
              --env-file /tmp/bu-api-canary.env \
              "$API_IMAGE" \
              || die "Failed to start bu-api-canary"

            # Wait for canary to be fully healthy before touching live traffic
            if ! wait_healthy_named bu-api-canary 180; then
              docker stop bu-api-canary 2>/dev/null || true
              docker rm   bu-api-canary 2>/dev/null || true
              rm -f /tmp/bu-api-canary.env
              die "bu-api-canary failed health check — aborting to preserve running container"
            fi

            # Canary is healthy: add the 'api' alias so nginx's DNS TTL picks it up
            # and starts load-balancing new requests to the canary
            docker network connect --alias api "$COMPOSE_NETWORK" bu-api-canary || true
            log "Canary joined network as 'api' — waiting for nginx DNS TTL (12s)..."
            sleep 12

            # Gracefully drain and remove the old container
            # nginx will route 100% of traffic to the canary during this gap
            log "Draining old bu-api container (30s grace period)..."
            docker stop --time=30 "$OLD_API_CTR" 2>/dev/null || true
            docker rm "$OLD_API_CTR" 2>/dev/null || true

            # Bring up the compose-managed container with the new image tag
            log "Starting compose-managed bu-api..."
            docker compose up -d --no-deps bu-api
            wait_healthy bu-api 180 || {
              log "bu-api health check failed — rolling back..."
              rollback_service bu-api
              wait_healthy bu-api 60 || true
              docker stop bu-api-canary 2>/dev/null || true
              docker rm   bu-api-canary 2>/dev/null || true
              rm -f /tmp/bu-api-canary.env
              die "Deploy aborted: bu-api failed to become healthy after restart."
            }

            # Compose container is healthy — remove the canary
            log "Removing bu-api-canary..."
            docker stop bu-api-canary 2>/dev/null || true
            docker rm   bu-api-canary 2>/dev/null || true
            rm -f /tmp/bu-api-canary.env

            # ── 5. Restart bu-worker ───────────────────────────────────────
            # Worker has a 60s stop_grace_period so in-flight BullMQ jobs can
            # finish cleanly. New worker picks up queue from Redis on start.
            log "Restarting bu-worker..."
            docker compose up -d --no-deps --force-recreate bu-worker
            # Non-fatal: worker has no HTTP healthcheck; check it started cleanly
            sleep 10
            if ! docker ps --filter "name=infra-bu-worker-1" --filter "status=running" -q | grep -q .; then
              log "WARNING: bu-worker does not appear to be running — check logs:"
              docker logs --tail=50 infra-bu-worker-1 2>/dev/null || true
            else
              log "bu-worker is running ✓"
            fi

            # ── 6. Restart bu-web ──────────────────────────────────────────
            # Nginx (or the load balancer) continues to route to the old container
            # until the new one is healthy. Docker restart policy handles this
            # via depends_on + healthcheck in docker-compose.yml.
            log "Restarting bu-web..."
            docker compose up -d --no-deps --force-recreate bu-web
            wait_healthy bu-web 120 || {
              log "bu-web health check failed — rolling back..."
              rollback_service bu-web
              wait_healthy bu-web 60 || true
              die "Deploy aborted: bu-web failed to become healthy after restart."
            }

            # ── 7. Final verification ──────────────────────────────────────
            log "Running final health verification..."
            api_status=$(docker inspect --format='{{.State.Health.Status}}' infra-bu-api-1 2>/dev/null || echo "unknown")
            web_status=$(docker inspect --format='{{.State.Health.Status}}' infra-bu-web-1 2>/dev/null || echo "unknown")
            worker_status=$(docker inspect --format='{{.State.Health.Status}}' infra-bu-worker-1 2>/dev/null || echo "unknown")

            log "Service health summary:"
            log "  bu-api:    $api_status"
            log "  bu-web:    $web_status"
            log "  bu-worker: $worker_status"

            if [ "$api_status" != "healthy" ] || [ "$web_status" != "healthy" ]; then
              die "One or more critical services are not healthy after deploy."
            fi

            # ── 8. Verify privacy page is reachable ────────────────────────
            log "Verifying /privacy route..."
            PRIVACY_STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "https://app.boardupscale.com/privacy" || echo "000")
            if [ "$PRIVACY_STATUS" = "200" ]; then
              log "/privacy is reachable (HTTP 200) ✓"
            else
              log "WARNING: /privacy returned HTTP ${PRIVACY_STATUS} — check nginx SPA fallback config."
            fi

            # ── 9. Prune old image layers ──────────────────────────────────
            docker image prune -f

            log "Deploy of ${IMAGE_TAG} completed successfully ✓"
